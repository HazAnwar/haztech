<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var base = window.location.hostname.includes('github.io') ? '/haztech/' : '/';
        document.write('<base href="' + base + '" />');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HazTech Services</title>
    
    <!-- METADATA_START -->
    <!-- Primary Meta Tags -->
    <meta name="title" content="HazTech Services" />
    <meta name="description" content="We build premium, high-performance mobile and web solutions designed to deliver exceptional user experiences." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://haztech.services/" />
    <meta property="og:title" content="HazTech Services" />
    <meta property="og:description" content="We build premium, high-performance mobile and web solutions designed to deliver exceptional user experiences." />
    <meta property="og:image" content="https://haztech.services/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://haztech.services/" />
    <meta property="twitter:title" content="HazTech Services" />
    <meta property="twitter:description" content="We build premium, high-performance mobile and web solutions designed to deliver exceptional user experiences." />
    <meta property="twitter:image" content="https://haztech.services/og-image.jpg" />
    <!-- METADATA_END -->

    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && preferDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
